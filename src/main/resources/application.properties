# Conexión a Supabase (PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.min-size=2

# Hibernate: no modificar las tablas automáticamente (ya las creamos con el script)
quarkus.hibernate-orm.database.generation=none

# CORS: permite que el frontend en localhost y produccion (Netlify) se conecte
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,https://fleettrackpr0.netlify.app,https://fleettrackprosaas.netlify.app
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# Puerto donde correra el backend
quarkus.http.port=8080
